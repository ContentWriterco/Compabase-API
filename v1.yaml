    CompanyListResponse:
      type: object
      description: Search/list response — **multiple** companies in `data`, not a single profile.
      required:
      - data
      - pagination
      properties:
        data:
          type: array
          description: One page of result rows (same filters as the request); length ≤ `pagination.limit`.
          items:
            $ref: '#/components/schemas/CompanyListItem'
        pagination:
          $ref: '#/components/schemas/CompanyListPagination'
    CompanyCountResponse:
      type: object
      required:
      - count
      properties:
        count:
          type: integer
          minimum: 0
          description: Number of companies matching the filters.
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
  parameters:
    CompanyFilterQ:
      name: q
      in: query
      description: 'Free-text search (company name and identifiers). **Digits** are treated as a possible KRS/NIP/REGON

        lookup. Whitespace is trimmed.

        Matching strategy:
        - identifier-like numeric input: identifier lookup path is used first.
          For 10-digit numeric values, exact match is attempted against KRS (`registry_number`) and NIP;
          an exact match is also attempted against REGON as stored in the index.
          For other numeric lengths, prefix matching is used for those identifier fields.
        - textual input: case-insensitive substring match on company name (`ILIKE %q%`).

        Numeric lookup has priority over text-name matching when `q` contains only digits.
        Example: `q=0000028860` is treated as identifier lookup (not generic relevance search).

        '
      schema:
        type: string
      example: orlen
    CompanyFilterKeywords:
      name: keywords
      in: query
      description: 'Keyword filter with **OR** semantics. Pass a comma-separated list, or repeat the parameter.

        Each keyword must be at least **2** characters after trimming.
        Empty tokens are ignored.
        Duplicate tokens may appear and are not guaranteed to be deduplicated server-side.
        Mixing repeated params and CSV is supported (e.g. `keywords=a,b&keywords=c`).

        '
      schema:
        type: string
      example: logistics,energy
    CompanyFilterLimit:
      name: limit
      in: query
      description: 'Page size. **Default:** `20`. For normal browsing the server caps at **100** per request.

        Values **greater than 100** are treated as bulk/export-style requests and are capped at **50000**.
        For interactive API clients, batches up to **5000** are recommended to reduce timeout risk and payload size.

        **Quota accounting:** monthly quota is counted per HTTP request, not per returned company row.
        Example: `limit=50000` still consumes **1** request from monthly quota.

        '
      schema:
        type: integer
        default: 20
        minimum: 1
    CompanyFilterOffset:
      name: offset
      in: query
      description: 'Zero-based row offset for classic **offset** pagination.

        Client contract: use either `offset` or `cursor` (not both).
        If both are provided, the server returns `400 CONFLICTING_PARAMETERS`.

        '
      schema:
        type: integer
        default: 0
        minimum: 0
    CompanyFilterCursor:
      name: cursor
      in: query
      description: 'Optional **cursor** for pagination: `entity_id` of the last row from the previous page.

        Cursor paging is ordered by `entity_id` ascending. Use it for deep paging/export-style traversal.
        Do not combine with `offset`; if both are sent, request fails with `400 CONFLICTING_PARAMETERS`.

        When present, the server may return `pagination.total: -1` and include `pagination.cursor` for the next page.

        '
      schema:
        type: string
        format: uuid
    CompanyFilterPkd:
      name: pkd
      in: query
      description: 'PKD code (Polish business activity classification). **Case-insensitive**; trimmed and uppercased server-side.

        By default only the **primary** PKD (`primary_only=true`) is matched; set `primary_only=false` to match any code in
        `all_pkd_codes`.

        '
      schema:
        type: string
      example: '62.01'
    CompanyFilterPrimaryOnly:
      name: primary_only
      in: query
      description: 'Boolean filter syntax is accepted (`true`/`false`).

        Semantics: `true` (default) means `pkd` matches `primary_pkd` only.
        `false` means `pkd` can match any entry in `all_pkd_codes`.

        '
      schema:
        type: boolean
        default: true
    CompanyFilterCurrency:
      name: currency
      in: query
      description: 'Display/filter currency context for financial threshold filters.

        Allowed values: `PLN`, `USD`, `EUR` (case-insensitive).
        Default is `PLN`.

        For `revenue_min` / `revenue_max`, the API applies thresholds against:
        - `revenue_total` when `currency=PLN`
        - `revenue_total_usd` when `currency=USD`
        - `revenue_total_eur` when `currency=EUR`

        '
      schema:
        type: string
        enum: [PLN, USD, EUR]
        default: PLN
    CompanyFilterVoivodeship:
      name: voivodeship
      in: query
      description: 'Voivodeship / region filter. Compared to `company_search.region` **case-insensitively** (lowercased on
        the server).

        Use the same spelling as stored in data (e.g. Polish voivodeship names such as `mazowieckie`, `śląskie`).
        Common values include: `dolnośląskie`, `małopolskie`, `mazowieckie`, `pomorskie`, `śląskie`, `wielkopolskie`.

        '
      schema:
        type: string
      example: mazowieckie
    CompanyFilterPostalCode:
      name: postal_code
      in: query
      description: 'Exact postal code match (trimmed). Format depends on source data (e.g. `00-001`).

        '
      schema:
        type: string
    CompanyFilterCity:
      name: city
      in: query
      description: 'City substring filter (case-insensitive **ILIKE** `%city%`).

        '
      schema:
        type: string
      example: Warszawa
    CompanyFilterRevenueMin:
      name: revenue_min
      in: query
      description: 'Minimum **total revenue** (`revenue_total`).

        Currency depends on `currency` query param (`PLN`/`USD`/`EUR`).
        If `currency` is omitted, PLN is used.
        Values are in **full currency units** (not thousands), e.g. `1000000` = one million PLN.
        Evaluated against the latest indexed financial snapshot per company.
        Companies with `null` in the selected revenue column do not match this filter.

        '
      schema:
        type: number
    CompanyFilterRevenueMax:
      name: revenue_max
      in: query
      description: 'Maximum **total revenue** threshold in full units.

        Currency depends on `currency` query param (`PLN`/`USD`/`EUR`).
        If `currency` is omitted, PLN is used.

        If `revenue_min > revenue_max`, the API returns `400` with code `INVALID_RANGE`.
        Evaluated against the latest indexed financial snapshot per company.
        Companies with `null` in the selected revenue column do not match this filter.

        '
      schema:
        type: number
    CompanyFilterRevenueOperatingMin:
      name: revenue_operating_min
      in: query
      description: Minimum operating revenue (net sales / operating revenue field from financials).
      schema:
        type: number
    CompanyFilterRevenueOperatingMax:
      name: revenue_operating_max
      in: query
      schema:
        type: number
    CompanyFilterProfitOperatingMin:
      name: profit_operating_min
      in: query
      schema:
        type: number
    CompanyFilterProfitOperatingMax:
      name: profit_operating_max
      in: query
      schema:
        type: number
    CompanyFilterProfitNetMin:
      name: profit_net_min
      in: query
      schema:
        type: number
    CompanyFilterProfitNetMax:
      name: profit_net_max
      in: query
      schema:
        type: number
    CompanyFilterIncomeTaxMin:
      name: income_tax_min
      in: query
      schema:
        type: number
    CompanyFilterIncomeTaxMax:
      name: income_tax_max
      in: query
      schema:
        type: number
    CompanyFilterCostWagesMin:
      name: cost_wages_min
      in: query
      schema:
        type: number
    CompanyFilterCostWagesMax:
      name: cost_wages_max
      in: query
      schema:
        type: number
    CompanyFilterCostAmortizationMin:
      name: cost_amortization_min
      in: query
      schema:
        type: number
    CompanyFilterCostAmortizationMax:
      name: cost_amortization_max
      in: query
      schema:
        type: number
    CompanyFilterTotalAssetsMin:
      name: total_assets_min
      in: query
