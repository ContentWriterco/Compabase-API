  /usage:
    get:
      tags:
      - Usage
      summary: Monthly quota usage for this API key
      description: 'Returns how many requests this key has used in the current UTC calendar month against its limit.

        This endpoint does not consume quota (usage counter is not incremented).

        '
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: Usage snapshot
          content:
            application/json:
              schema:
                type: object
                required:
                - used
                - limit
                - remaining
                - monthUtc
                - resetsAtUtc
                properties:
                  used:
                    type: integer
                  limit:
                    type: integer
                  remaining:
                    type: integer
                  monthUtc:
                    type: string
                    example: 2026-03
                  resetsAtUtc:
                    type: string
                    format: date-time
                    example: '2026-04-01T00:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  responses:
    BadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidKrs:
              summary: Invalid KRS value
              value:
                error:
                  code: INVALID_KRS
                  message: KRS must contain 10 digits after normalization.
                  details:
                    parameter: krs
                    reason: invalid_format
            invalidCursor:
              summary: Invalid cursor format
              value:
                error:
                  code: INVALID_CURSOR
                  message: Cursor must be a valid UUID.
                  details:
                    parameter: cursor
                    reason: invalid_uuid
            invalidRange:
              summary: Invalid numeric range
              value:
                error:
                  code: INVALID_RANGE
                  message: revenue_min cannot be greater than revenue_max.
                  details:
                    parameter: revenue_min,revenue_max
                    reason: min_greater_than_max
    Unauthorized:
      description: Missing, invalid, or revoked API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: Missing or invalid API key.
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: Company not found.
    TooManyRequests:
      description: Monthly quota exceeded for this API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: QUOTA_EXCEEDED
              message: Monthly quota exceeded for this API key.
  schemas:
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Domain error code.
              enum:
              - INVALID_KRS
              - INVALID_CURSOR
              - INVALID_RANGE
              - INVALID_PARAMETER
              - CONFLICTING_PARAMETERS
              - INVALID_BOOLEAN
              - INVALID_KEYWORDS
              - UNAUTHORIZED
              - NOT_FOUND
              - QUOTA_EXCEEDED
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    CompanyListPagination:
