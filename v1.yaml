    CompanyFilterLastReportYearMin:
      name: last_report_year_min
      in: query
      description: 'Earliest **financial report period** (`financial_period_to` on or after `YYYY-01-01`).

        When combined with financial metric filters, both are evaluated against the same indexed reporting snapshot.

