    CompanyFilterLastReportYearMax:
      name: last_report_year_max
      in: query
      description: 'Latest financial report period (`financial_period_to` on or before `YYYY-12-31`).

        When combined with financial metric filters, both are evaluated against the same indexed reporting snapshot.

        '
      schema:
        type: integer
    CompanyFilterStatusActive:
      name: status_active
      in: query
      description: 'Boolean filter syntax is accepted (`true`/`false`).

        Semantics: `true` applies positive filter (only active companies).
        `false` is syntactically valid and treated as no filter.

        '
      schema:
        type: boolean
    CompanyFilterLegalForm:
      name: legal_form
      in: query
      description: 'Legal form substring filter (case-insensitive **ILIKE** `%legal_form%`).

        Common values/phrases:
        `spółka z ograniczoną odpowiedzialnością`, `spółka akcyjna`, `prosta spółka akcyjna`,
        `spółka komandytowa`, `jednoosobowa działalność gospodarcza`.

        '
      schema:
        type: string
      example: spółka akcyjna
    CompanyFilterHasEmail:
      name: has_email
      in: query
      description: 'Boolean filter syntax is accepted (`true`/`false`).

        Semantics: `true` applies positive filter (only companies with email).
        `false` is syntactically valid and treated as no filter.

        '
      schema:
        type: boolean
    CompanyFilterHasWebsite:
      name: has_website
      in: query
      description: 'Boolean filter syntax is accepted (`true`/`false`).

        Semantics: `true` applies positive filter (only companies with website).
        `false` is syntactically valid and treated as no filter.

